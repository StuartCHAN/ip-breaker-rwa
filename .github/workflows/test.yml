name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run All Forge Tests
        run: forge test -vvv

      - name: Run Security Tests
        run: forge test --match-path test/LicenseEscrow.Security.t.sol -vvv

      - name: Run State Machine Tests
        run: forge test --match-path test/LicenseEscrow.StateMachine.t.sol -vvv

      - name: Run Invariant Tests
        run: forge test --match-path test/LicenseEscrow.Invariant.t.sol -vvv
